<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para o Amor da Minha Vida ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffc3a0);
    overflow:hidden;
}

.hearts{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
}

.heart{
    position:absolute;
    color:white;
    animation:float 8s linear infinite;
    opacity:.8;
}

@keyframes float{
    0%{
        transform:translateY(100vh) scale(.5);
        opacity:0;
    }
    30%{
        opacity:1;
    }
    100%{
        transform:translateY(-120vh) scale(1.5);
        opacity:0;
    }
}

.container{
    position:relative;
}

.envelope{
    width:320px;
    height:220px;
    background:#d94c71;
    position:relative;
    cursor:pointer;
    border-radius:10px;
    box-shadow:0 15px 40px rgba(0,0,0,.35);
    transition:.6s;
}

.envelope:before{
    content:'';
    position:absolute;
    top:0;
    left:0;
    border-left:160px solid transparent;
    border-right:160px solid transparent;
    border-top:120px solid #f26b8a;
    transform-origin:top;
    transition:.8s;
    z-index:3;
}

.envelope.open:before{
    transform:rotateX(180deg);
}

.letter{
    position:absolute;
    width:90%;
    height:92%;
    background:white;
    left:5%;
    top:5%;
    border-radius:10px;
    padding:25px;
    overflow:auto;
    transform:translateY(50px);
    opacity:0;
    transition:1s;
}

.envelope.open .letter{
    transform:translateY(-130px);
    opacity:1;
}

.envelope.open:before{
    transform:rotateX(180deg) translateY(-30px);
    opacity:0;
    pointer-events:none;
}

h2{
    color:#d94c71;
    text-align:center;
    margin-bottom:20px;
}

p{
    color:#555;
    line-height:1.7;
    white-space:pre-wrap;
}

button{
    margin-top:25px;
    width:100%;
    padding:15px;
    border:none;
    background:#ff5b8a;
    color:white;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

#final{
    display:none;
    margin-top:20px;
    text-align:center;
    font-size:20px;
    color:#d94c71;
    font-weight:bold;
}

::-webkit-scrollbar{
    width:6px;
}

::-webkit-scrollbar-thumb{
    background:#ff8ca8;
    border-radius:20px;
}
</style>
</head>

<body>

<div class="hearts"></div>

<div class="container">

<div class="envelope" id="envelope">

<div class="letter">

<h2>Para Você ❤️</h2>

<p id="text"></p>

<button onclick="acceptLove()">❤️ Sim, sempre ❤️</button>

<div id="final">
✨ Agora tenho ainda mais certeza de que quero viver milhares de capítulos ao seu lado. Eu te amo infinitamente. ❤️
</div>

</div>

</div>

</div>

<script>

const envelope = document.getElementById("envelope");

envelope.addEventListener("click",()=>{

    envelope.classList.add("open");

    if(document.getElementById("text").innerHTML==""){
        typeWriter();
    }

});

const message=`Meu amor,

Existem pessoas que passam pelas nossas vidas e deixam lembranças. Você fez muito mais do que isso: transformou a minha vida.

Desde que você chegou, os meus dias ganharam mais cor, mais paz e mais felicidade. Cada sorriso seu ilumina o meu coração de uma maneira que eu jamais imaginei ser possível.

Quero que você saiba que, acima de tudo, eu quero ser o seu abrigo. Quero que você se sinta segura para compartilhar seus sonhos, seus medos, suas alegrias e até os seus dias difíceis. Nunca tenha medo de viver esse amor comigo.

Não quero ser apenas alguém que caminha ao seu lado nos dias felizes. Quero ser a pessoa que segura a sua mão quando tudo parecer difícil, que celebra cada conquista sua como se fosse minha e que sempre fará você lembrar o quanto é especial.

Você é o amor da minha vida. Obrigado por existir, por me escolher todos os dias e por tornar a minha história infinitamente mais bonita.

Eu prometo continuar te amando, te respeitando, te apoiando e fazendo de tudo para ver esse sorriso lindo iluminando os nossos dias.

E, se depender de mim, essa será apenas a primeira de milhares de cartas que ainda escreverei para você.

Eu te amo, hoje, amanhã e para sempre. ❤️"

Você aceita continuar escrevendo essa linda história comigo?

Com todo o meu amor,

❤️ Eu te amo. ❤️`;

let i=0;

function typeWriter(){

    if(i<message.length){

        document.getElementById("text").innerHTML += message.charAt(i);

        i++;

        setTimeout(typeWriter,25);

    }

}

function acceptLove(){

    document.getElementById("final").style.display="block";

    for(let i=0;i<80;i++){

        createHeart();

    }

}

function createHeart(){

    let heart=document.createElement("div");

    heart.className="heart";

    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";

    heart.style.fontSize=(Math.random()*25+15)+"px";

    heart.style.animationDuration=(Math.random()*5+4)+"s";

    document.querySelector(".hearts").appendChild(heart);

    setTimeout(()=>{

        heart.remove();

    },9000);

}

setInterval(createHeart,400);

</script>

</body>
</html>
